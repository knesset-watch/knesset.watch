        - 'button "18 במרץ 2024 – פרוטוקול 361 ✓ תמלול נכחו: חברי הוועדה: משה גפני – היו\"ר ולדימיר בליאק עודד פורר יצחק קרויזר חברי הכנסת: רון כץ מוזמנים: יואל חלימי – מנהל אגף בכיר שומה וביקורת מע\"מ, רשות המסים רמי יצקין – רשות המיסים יובל עומסי – סמנכ\"ל כספים ומשנה למנכ\"ל הדקלאים אגש\"ח מרכזית בע\"מ חיים דיין – שיווק, מכוין תערובת כפר יהושע רועי כהן – עו\"ד ונשיא להב דין אלחרר – יו\"ר הארגוין, האגודה לעידוד ייצור האופנה בישראל יעקב אחדות – יצרין אופנה - חבר ועד מנהל, האגודה לעידוד ייצור האופנה בישראל נמרוד הגלילי – מנהל אגף חטיבות ענפיות, איגוד לשכות המסחר ייעוץ משפטי: שלומית ארליך מנהל הוועדה: טמיר כהן רישום פרלמנטרי: הדס צנוירט רשימת הנוכחים על תואריהם מבוססת על המידע שהוזין במערכת המוזמנים הממוחשבת. ייתכנו אי-דיוקים והשמטות. 📋 1 הצ\"ח 53 קטעים פתח PDF ▼" [ref=e9534]':
