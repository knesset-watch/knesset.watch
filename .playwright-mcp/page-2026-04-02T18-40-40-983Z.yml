              - generic [ref=e11221]: ✓ תמלול
            - paragraph [ref=e11222]: "הצעת החלטת משכורת נושאי משרה שיפוטית (הוראת שעה- חרבות ברזל), התשפ\"ד – 2023 2. הצעת החלטת משכורת נשיא המדינה (הוראת שעה – חרבות ברזל), התשפ\"ד-2023 3. הצעת החלטת שכר שרים וסגני שרים (הוראת שעה – חרבות ברזל), התשפ\"ד – 2023 < נושא >> נכחו: חברי הוועדה: משה גפני – היו\"ר ינון אזולאי ולדימיר בליאק אלי דלל נעמה לזימי משה סולומון חמד עמאר אליהו רביבו מיכל שיר סגמן מוזמנים: סגן חשב הכנסת נדב כספי עידו חי – רפרנט משפט ואכיפה, משרד האוצר עילם שניר – עו\"ד, משרד המשפטים מיכאל שפיצר – מנהל בתי המשפט מיכאל שפירא – סמנכ\"ל תכנון אסטרטגיה ותקציבים, הנהלת בתי המשפט מורן פרוינד – ממונה בכירה לשכה משפטית, הנהלת בתי המשפט יהודה גוטמן – יועץ מנכ\"ל, בתי הדין הרבניים ירון לוי – יו\"ר נציגות השופטים טובי חכמיאן – חשבות הכנסת ייעוץ משפטי: שלומית ארליך מנהל הוועדה: טמיר כהן רישום פרלמנטרי: יפעת קדם רשימת הנוכחים על תואריהם מבוססת על המידע שהוזן במערכת המוזמנים הממוחשבת. ייתכנו אי-דיוקים והשמטות."
            - generic [ref=e11223]:
