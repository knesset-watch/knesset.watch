        - 'button "1 בנובמבר 2023 – פרוטוקול 233 ✓ תמלול היערכות הממשלה למתן סיוע כלכלי לענף התיירות בהשתתפות שר התיירות, חיים כץ – המשך דיון< נושא >> נכחו: חברי הוועדה: משה גפני – היו\"ר ינון אזולאי ולדימיר בליאק אלי דלל משה סולומון חוה אתי עטייה חמד עמאר יצחק פינדרוס מוזמנים: חיים כץ – שר התיירות מיכאל יצחקוב – ראש מטה שר התיירות מרינה גוטליב – יועצת שר התיירות רמי איסמן – לשכה משפטית, משרד התיירות נעם דן – רכזת תקשורת מו\"פ והשכל\"ג באג\"ת, משרד האוצר אלי כהן – נשיא, התאחדות בתי המלון יעל דניאלי – מנכ\"לית, התאחדות המלונות בישראל יוסף פתאל – מנכ\"ל, לשכת מארגניה תיירות הנכנסת יונתן שפירא – יו\"ר מורשת דרך משה נוב – חבר מועצה, אגודת מורי הדרך טלי לאופר – מנכ\"לית, התאחדות משרדי הנסיעות אורי אביגדור – אמסלם טורס ייעוץ משפטי: שלומית ארליך מנהל/ת הוועדה: טמיר כהן רישום פרלמנטרי: יפעת קדם רשימת הנוכחים על תואריהם מבוססת על המידע שהוזן במערכת המוזמנים הממוחשבת. ייתכנו אי-דיוקים והשמטות. 📋 1 הצ\"ח 120 קטעים פתח PDF ▼" [ref=e11779]':
