            - paragraph [ref=e10845]: "הצעת תקנות מס רכוש וקרן פיצויים (הארכת התקופה הקובעת וקביעת תיאומים), התשפ\"ד-2023. 2. דיון מעקב אחר יישום מתווה הפיצויים בעקבות מצב הלחימה והיערכות הממשלה למתן פיצוי< נושא >> נכחו: חברי הוועדה: ינון אזולאי – מ\"מ היו\"ר ולדימיר בליאק אלי דלל אחמד טיבי אימאן ח'טיב יאסין אופיר כץ נעמה לזימי סימון מושיאשוילי חנוך דב מלביצקי חוה אתי עטייה חמד עמאר יצחק פינדרוס אורית פרקש הכהן יצחק קרויזר אליהו רביבו מיכל שיר סגמן חברי הכנסת: דבי ביטון אליהו ברוכי ששון ששי גואטה סימון דוידסון ניסים ואטורי אלמוג כהן רון כץ יסמין פרידמן משה רוט מוזמנים: כפיר בטט – סגן ממונה על התקציבים, משרד האוצר גל ברנס – אגף תקציבים, משרד האוצר עידית לב זרחיה – דוברת, רשות המסים שי אהרונוביץ – מנהל רשות המסים אמיר דהן – מנהל מחלקת פיצויים, רשות המסים ישי פרלמן – עוזר ראשי משפטית, רשות המסים אורלי שיף – עוזרת ייעוץ משפטי חקיקה, רשות המסים רמי יצקן – מנהל קרן הפיצויים, רשות המסים יעל אסיף – עוזרת ייעוץ משפטי, רשות המסים גיא ג'ורנו – סגן בכיר לממונה אזורי מע\"מ, רשות המסים ליהי קושנר גינוסר – עו\"ד, משרד המשפטים אורי צוק בר – סמנכ\"ל כלכלה, משרד החקלאות אלון דסה – מנהל אגף, המוסד לביטוח לאומי רונן פוטרמן – המוסד לביטוח לאומי משה דוידוביץ – ראש מועצה אזורית מטה אשר עמית סופר – ראש המועצה האזורית מרום הגליל אבי נוימן – יו\"ר משותף ועדת מסים לשכת רואי החשבון יניב פתיה – ריפוי סיני, לה\"ב - לשכת ארגוני העצמאים והעסקים בישראל אלי מנטבר – חבר הנהלה, לה\"ב - לשכת ארגוני העצמאים והעסקים בישראל רועי כהן – נשיא לה\"ב, לשכת ארגוני העצמאים והעסקים בישראל צמרת אביבי – סגנית נשיא לה\"ב - לשכת ארגוני העצמאים והעסקים בישראל אסף מור – האגודה לריפוי סיני, לה\"ב - לשכת ארגוני העצמאים והעסקים בישראל אבירם אלון – מנכ\"ל, התאחדות בעלי אולמות וגני אירועים ישראלה מני – סמנכ\"לית כלכלה, איגוד לשכות המסחר גנית פלג – יו\"ר, אגודת מורי דרך משה נוב – חבר הנהלה, אגודת מורי דרך טלי לאופר – מנכ\"לית, התאחדות משרדי הנסיעות שחר סומך – צוות פורום העצמאים מבית ההסתדרות שלומי בן גור – מנהל מטה העצמאים בהתעוררות ירושלים יקיר ליסיצקי – סמנכ\"ל רגולציה, איגוד המסעדות אילנה דרור – כלכלנית, התאחדות חקלאי ישראל אורי דורמן – מזכ\"ל, התאחדות חקלאי ישראל ניר ינושבסקי – סגן נשיא ויו\"ר אגף בנייה חוזית, התאחדות הקבלנים בוני הארץ נתנאל היימן – ראש אגף כלכלה, התאחדות התעשינים בישראל הדר שור – נציגה ממשרד רו\"ח, עיריית קרית שמונה אופיר יחזקאלי – מ\"מ ראש עיריית קריית שמונה הגר יהב – מנכ\"לית, נשיאות המגזר העסקי דובי אמיתי – יו\"ר, נשיאות המגזר העסקי ליאת נויבירט – עו\"ד, לשכת עורכי הדין יוסי אלקובי – נשיא התאחדות מלאכה ותעשייה יונתן פיינגולד – יו\"ר, איגוד האמרגנים ומפיקי אמנויות הבמה בישראל ייעוץ משפטי: שלומית ארליך מנהל הוועדה: טמיר כהן רישום פרלמנטרי: יפעת קדם רשימת הנוכחים על תואריהם מבוססת על המידע שהוזן במערכת המוזמנים הממוחשבת. ייתכנו אי-דיוקים והשמטות."
