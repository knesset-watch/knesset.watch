            - paragraph [ref=e2396]: "דיון המשך בנושא נזקי הבצורת בצפון הארץ נכחו: חברי הוועדה: חנוך דב מלביצקי – היו\"ר ינון אזולאי ולדימיר בליאק אלי דלל אכרם חסון חוה אתי עטייה חמד עמאר נאור שירי מוזמנים: עידו מור – רכז מים והגנ\"ס באגף תקציבים, משרד האוצר פארוק דבור – מנהל מחוז צפון, משרד החקלאות וביטחון המזון רם שדמון – מנהל תחום נגר ושימור קרקע, משרד החקלאות וביטחון המזון תהל ברנדס – סמנכ\"ל בכירה אסדרה, רשות המים איתן שדה – מנכ\"ל, תאגידי מים וביוב דובי אמיתי – נשיא התאחדות האיכרים והחקלאים בישראל אורי דורמן – מזכ\"ל התאחדות חקלאי ישראל ואיל מוגרבי – ראש מועצת עין קנייא, מרכז השלטון המקומי עפר ברנע – מנכ\"ל מועצה אזורית גליל עליון עדאל פלאח – יועץ למגזר הדרוזי במש\"מ, מרכז השלטון המקומי אורנה שרון – מדריכה ארצית, קול אישה אריאל ריין – מוזמן ייעוץ משפטי: אמיתי כהן מנהל הוועדה: טמיר כהן רישום פרלמנטרי: רמי בן שמעון רשימת הנוכחים על תואריהם מבוססת על המידע שהוזן במערכת המוזמנים הממוחשבת. ייתכנו אי-דיוקים והשמטות."
