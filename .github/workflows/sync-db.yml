name: Sync Knesset DB

on:
  schedule:
    # Run at 04:00 UTC (06:00 Israel time) — after midnight Knesset updates settle
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      run_investigative:
        description: 'Also run sync-investigative (sessions + attendance, slow)'
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install build tools (for better-sqlite3 native compilation)
        run: |
          # macOS has python3, make, and clang pre-installed via Xcode CLT
          xcode-select --install 2>/dev/null || true

      - name: Install dependencies
        run: npm install --ignore-scripts && npm rebuild better-sqlite3

      - name: Prepare DB for sync
        run: |
          cp apps/knesset-watch/knesset-deploy.db apps/knesset-watch/knesset.db
          echo "Deploy DB size: $(du -sh apps/knesset-watch/knesset-deploy.db | cut -f1)"

      - name: Run incremental sync
        run: cd apps/knesset-watch && npm run db:sync
        env:
          NODE_OPTIONS: '--max-old-space-size=512'

      - name: Run investigative sync (sessions + attendance)
        if: github.event.inputs.run_investigative == 'true'
        run: cd apps/knesset-watch && npm run db:sync-investigative
        env:
          NODE_OPTIONS: '--max-old-space-size=512'

      - name: Update deploy DB
        run: |
          cp apps/knesset-watch/knesset.db apps/knesset-watch/knesset-deploy.db
          echo "Updated deploy DB size: $(du -sh apps/knesset-watch/knesset-deploy.db | cut -f1)"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet apps/knesset-watch/knesset-deploy.db; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No new data — skipping commit."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "DB updated — will commit."
          fi

      - name: Commit and push updated DB
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/knesset-watch/knesset-deploy.db
          git commit -m "chore: nightly DB sync $(date -u '+%Y-%m-%d')"
          git push
